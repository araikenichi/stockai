name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to publish, e.g. v2.0.6"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout selected tag
        run: git checkout "${{ steps.tag.outputs.tag }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Import Apple signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Build install packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_KEY_ID}" ] && [ -n "${APPLE_API_ISSUER}" ] && [ -n "${{ secrets.APPLE_CERTIFICATE_P12 }}" ]; then
            echo "Signed + notarized macOS release build"
            npx electron-builder --mac dmg zip --arm64
            npx electron-builder --mac dmg zip --x64
          else
            echo "Unsigned fallback build (no Apple signing/notarization secrets configured)"
            npm run dist
          fi

      - name: Prepare release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## StockAI Release

          - Built automatically from GitHub Actions
          - Includes macOS `.dmg` and `.zip` assets

          ### Install notes

          - Drag `StockAI.app` into `Applications` before opening
          - If this release was built without Apple signing/notarization secrets, macOS may show a warning on first launch
          - Signed + notarized builds require these repository secrets:
            - `APPLE_CERTIFICATE_P12`
            - `APPLE_CERTIFICATE_PASSWORD`
            - `APPLE_API_KEY`
            - `APPLE_API_KEY_ID`
            - `APPLE_API_ISSUER`
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body_path: release-notes.md
          files: |
            dist/*.dmg
            dist/*.zip
